# Brainstorm Routing Rules
# Generated by `storm onboard` — maps task patterns to specialized agents.
#
# Format: match pattern → agent ID, model tier, rationale
# Edit freely — these rules override heuristic routing.

rules:
  - match: "code-review"
    agent: code-reviewer
    model: capable
    # Route code review tasks to the dedicated code-reviewer for quality feedback.

  - match: "architecture"
    agent: architect
    model: quality
    # High-level design and architectural tasks require quality-tier reasoning.

  - match: "refactoring"
    agent: architect
    model: quality
    # Refactoring tasks benefit from architectural insights to improve design coherence.

  - match: "api"
    agent: api-expert
    model: capable
    # Tasks related to API routes should be handled by the API expert due to the presence of 3 API routes.

  - match: "endpoint"
    agent: api-expert
    model: capable
    # Endpoint creation or modifications are best managed by the API expert.

  - match: "test"
    agent: qa
    model: capable
    # Testing tasks, particularly those using Vitest, should be directed to QA.

  - match: "security"
    agent: security-reviewer
    model: quality
    # Security-related tasks require a thorough security review to ensure safety.

  - match: "audit"
    agent: security-reviewer
    model: quality
    # Audit tasks are linked to security and need in-depth analysis.

  - match: "deploy|ci"
    agent: devops
    model: capable
    # Deployment and CI/CD pipeline tasks should be handled by DevOps (GitHub Actions integration detected).

  - match: "packages/tools/src/builtin"
    agent: packages-tools-src-builtin-expert
    model: capable
    # Module 'packages/tools/src/builtin' (45 files) requires specialized expertise.

  - match: "apps/web/src/components/company"
    agent: apps-web-src-components-company-expert
    model: capable
    # Module 'apps/web/src/components/company' (22 files) benefits from domain-specific expertise.

  - match: "packages/core/src/middleware/builtin"
    agent: packages-core-src-middleware-builtin-expert
    model: capable
    # Module 'packages/core/src/middleware/builtin' (22 files) necessitates focused attention from a specialized expert.
