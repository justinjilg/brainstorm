# Brainstorm Routing Rules
# Generated by `storm onboard` — maps task patterns to specialized agents.
#
# Format: match pattern → agent ID, model tier, rationale
# Edit freely — these rules override heuristic routing.

rules:
  - match: "code-review"
    agent: code-reviewer
    model: capable
    # Route review tasks to dedicated reviewer for quality assurance.

  - match: "architecture"
    agent: architect
    model: quality
    # Design tasks need quality-tier reasoning due to their high impact.

  - match: "refactoring"
    agent: architect
    model: quality
    # Refactoring needs architectural awareness to maintain system integrity.

  - match: "api"
    agent: api-expert
    model: capable
    # Project has 5 API routes; use specialist for API-related tasks.

  - match: "endpoint"
    agent: api-expert
    model: capable
    # Endpoint creation/modification falls under API expertise.

  - match: "test"
    agent: qa
    model: capable
    # Test writing and debugging requires QA specialist knowledge (Vitest detected).

  - match: "security"
    agent: security-reviewer
    model: quality
    # Security tasks need thorough analysis from a quality-tier model due to high project complexity.

  - match: "audit"
    agent: security-reviewer
    model: quality
    # Code audits are security-adjacent and require a quality-tier model.

  - match: "deploy"
    agent: devops
    model: capable
    # Deployment and infrastructure tasks require DevOps expertise (GitHub Actions detected).

  - match: "ci"
    agent: devops
    model: capable
    # CI/CD pipeline tasks are best handled by the DevOps expert.

  - match: "code-generation:packages/tools/src/builtin"
    agent: packages-tools-src-builtin-expert
    model: capable
    # Route code generation tasks specific to the 'builtin' tools module to its expert.

  - match: "bug-fix:packages/tools/src/builtin"
    agent: packages-tools-src-builtin-expert
    model: capable
    # Route bug fixes specific to the 'builtin' tools module to its expert.

  - match: "feature:packages/tools/src/builtin"
    agent: packages-tools-src-builtin-expert
    model: capable
    # Route feature implementations specific to the 'builtin' tools module to its expert.

  - match: "code-generation:apps/web/src/components/company"
    agent: apps-web-src-components-company-expert
    model: capable
    # Route code generation tasks specific to company web components to its expert.

  - match: "bug-fix:apps/web/src/components/company"
    agent: apps-web-src-components-company-expert
    model: capable
    # Route bug fixes specific to company web components to its expert.

  - match: "feature:apps/web/src/components/company"
    agent: apps-web-src-components-company-expert
    model: capable
    # Route feature implementations specific to company web components to its expert.

  - match: "code-generation:packages/core/src/middleware/builtin"
    agent: packages-core-src-middleware-builtin-expert
    model: capable
    # Route code generation tasks specific to core middleware to its expert.

  - match: "bug-fix:packages/core/src/middleware/builtin"
    agent: packages-core-src-middleware-builtin-expert
    model: capable
    # Route bug fixes specific to core middleware to its expert.

  - match: "feature:packages/core/src/middleware/builtin"
    agent: packages-core-src-middleware-builtin-expert
    model: capable
    # Route feature implementations specific to core middleware to its expert.

  - match: "code-generation"
    agent: api-expert
    model: capable
    # General code generation tasks can be handled by a capable coder when no specific module expert is matched.

  - match: "feature-implementation"
    agent: api-expert
    model: capable
    # General feature implementation tasks can be handled by a capable coder when no specific module expert is matched.

  - match: "debugging"
    agent: api-expert
    model: capable
    # General debugging tasks can be handled by a capable coder when no specific module expert is matched.

  - match: "bug-fix"
    agent: api-expert
    model: capable
    # General bug fixes can be handled by a capable coder when no specific module expert is matched.

  - match: "simple-fix"
    agent: api-expert
    model: cheap
    # For trivial code fixes, use a cheap model to conserve resources.
