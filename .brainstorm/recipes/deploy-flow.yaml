name: Deploy Flow
description: Implement, verify, and prepare for deployment
communication: handoff
maxIterations: 2
steps:
  - id: implement
    role: coder
    description: "Implement the necessary changes in TypeScript, ensuring adherence to project conventions and Turborepo's workspace structure, and considering potential deployment impacts while implementing robust error handling."
    output: code

  - id: verify
    role: qa
    description: "Execute a full verification sequence: run `npx turbo build` across all affected packages, perform type-checking, run linting, execute all Vitest unit/integration tests, run Playwright E2E tests for the desktop app, and confirm the `ci-wiring-check.mjs` passes to ensure deployment readiness."
    input: [code]
    output: test-result

  - id: deploy-prep
    role: devops
    description: "Review deployment configuration, dependencies, and environmental considerations for all affected Turborepo packages. Prepare detailed deployment steps, including any necessary database migrations or infrastructure changes, anticipating CI's deployment stage."
    input: [code, test-result]
    output: deploy-plan

  - id: review
    role: code-reviewer
    description: "Conduct a final pre-deployment review, verifying all CI stages (build, typecheck, lint, test) have passed, confirming error handling mechanisms (CLI console.error/process.exit, desktop logToFile, agent self-correction) are robust, and ensuring the deployment plan aligns with production requirements."
    input: [code, test-result, deploy-plan]
    output: review
    review: true
    loopBack: implement
