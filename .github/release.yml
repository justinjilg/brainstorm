changelog:
  categories:
    - title: New Features
      labels:
        - enhancement
        - feat
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Infrastructure
      labels:
        - ci
        - dependencies
        - refactor
    - title: Other Changes
      labels:
        - "*"
