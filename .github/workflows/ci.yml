name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx turbo run build --filter='!@brainst0rm/desktop'

      - name: Type check
        run: npx turbo run typecheck --filter='!@brainst0rm/desktop'

      # Guard against a specific memory-leak shape Pass 2 + Pass 3 of the
      # quality scan both kept finding: AbortSignal.timeout(ms) wired to
      # addEventListener("abort", …) without { once: true } or a matching
      # removeEventListener pair. See scripts/lint-abort-signal-timeout.mjs.
      - name: Lint — AbortSignal.timeout cleanup
        run: npm run lint:abort-signal

      # Ratchet for `as any` escape hatches. v11 Operator finding:
      # pre-fix this script existed but was never invoked by CI, so
      # the cap at 285 from pass 22 was advisory. Now enforced.
      # Raise the budget in scripts/check-as-any-budget.mjs only in the
      # SAME PR that adds the new cast + justifies it in the commit.
      - name: Lint — as-any escape-hatch budget
        run: node scripts/check-as-any-budget.mjs

      - name: Verify tool catalog freshness
        continue-on-error: true
        run: |
          npm run --workspace=@brainst0rm/tools export-catalog
          git diff --exit-code docs/tool-catalog.json || echo "::warning::Tool catalog drifted — run: npm run --workspace=@brainst0rm/tools export-catalog"

      # Create ~/.brainstorm directory structure for tests that reference it
      - name: Prepare test environment
        run: mkdir -p ~/.brainstorm/projects

      # Tests MUST pass. No --passWithNoTests at the turbo level.
      # Individual packages that legitimately have no tests use it in their package.json.
      - name: Run tests (excluding core — has CI env issues being fixed)
        run: npx turbo run test --filter='!@brainst0rm/desktop' --filter='!@brainst0rm/vault' --filter='!@brainst0rm/core'

      # TODO (v11 Operator finding): this step has carried
      # `continue-on-error: true` for multiple rounds with the rationale
      # "known CI env issue with memory paths". Core tests pass locally
      # (410 tests green in isolation) but fail in GitHub Actions due
      # to HOME/filesystem differences — a real problem masked here.
      # Do NOT remove this flag without reproducing + fixing the CI env
      # issue. But DO NOT add new soft-fail steps either — this is debt.
      - name: Run core tests (known CI env issue with memory paths)
        continue-on-error: true
        run: npx turbo run test --filter=@brainst0rm/core

      # TODO (v11 Operator finding): vault tests pass locally (56 tests,
      # incl. Argon2id) but flake in CI on slow runners. Same debt shape
      # as core above — document before fixing.
      - name: Run vault tests (slow Argon2id)
        run: npx turbo run test --filter=@brainst0rm/vault
        timeout-minutes: 5
        continue-on-error: true

      # Wiring smoke test: verifies that critical functions are exported,
      # the tool registry contains expected tools, the middleware pipeline
      # creates successfully, and the memory tool wires to a real MemoryManager.
      # This catches the entire class of "defined but never called" bugs.
      - name: Wiring smoke test
        run: node packages/core/src/__tests__/ci-wiring-check.mjs
