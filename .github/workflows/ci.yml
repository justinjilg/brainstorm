name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Ratchet for `as any` escape hatches runs BEFORE `npm ci`.
      # v12 Pessimist/Auditor/Operator/Sr-Engineer consensus (4/10):
      # if this ran post-install, a compromised transitive dep with a
      # postinstall hook could rewrite scripts/check-as-any-budget.mjs
      # between the install and the enforcement step. The script uses
      # only Node stdlib (execFileSync + grep) so it has no install
      # dependency. Moving it here closes the supply-chain tamper
      # window. Raise the budget in scripts/check-as-any-budget.mjs
      # only in the SAME PR that adds the new cast + justifies it.
      - name: Lint — as-any escape-hatch budget (pre-install, supply-chain safe)
        run: node scripts/check-as-any-budget.mjs

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx turbo run build --filter='!@brainst0rm/desktop'

      - name: Type check
        run: npx turbo run typecheck --filter='!@brainst0rm/desktop'

      # Guard against a specific memory-leak shape Pass 2 + Pass 3 of the
      # quality scan both kept finding: AbortSignal.timeout(ms) wired to
      # addEventListener("abort", …) without { once: true } or a matching
      # removeEventListener pair. See scripts/lint-abort-signal-timeout.mjs.
      - name: Lint — AbortSignal.timeout cleanup
        run: npm run lint:abort-signal

      # Architectural boundary ratchet for the 27-package graph.
      # v9-v12 assessment's Architect persona flagged the absence of
      # dep-cruiser as the highest-leverage structural gap for 5-year
      # survival. Pass 32 adds one rule (no-circular) with budget 0 —
      # a new dep cycle fails the build. Runs AFTER `npm ci` because
      # depcruise is an installed binary, not stdlib (trade-off
      # acknowledged: as-any ratchet runs pre-install for supply-chain
      # safety; this one can't).
      - name: Architecture — no circular imports (dep-cruiser ratchet)
        run: node scripts/check-dep-cruiser.mjs

      # Uses export-catalog:check which normalizes the `generated`
      # timestamp before comparison. Previous version ran `export-catalog`
      # (write mode) then `git diff --exit-code` — that flagged every
      # run because the timestamp always drifted, and because prettier
      # compacted the committed file's arrays while the generator emits
      # canonical multi-line JSON. continue-on-error was masking both.
      # docs/tool-catalog.json is now in .prettierignore so the generator
      # output stays stable across commits.
      - name: Verify tool catalog freshness
        run: npm run --workspace=@brainst0rm/tools export-catalog:check

      # Create ~/.brainstorm directory structure for tests that reference it
      - name: Prepare test environment
        run: mkdir -p ~/.brainstorm/projects

      # Tests MUST pass. No --passWithNoTests at the turbo level.
      # Individual packages that legitimately have no tests use it in their package.json.
      - name: Run tests (tools + everything except desktop/core/vault)
        run: npx turbo run test --filter='!@brainst0rm/desktop' --filter='!@brainst0rm/vault' --filter='!@brainst0rm/core'

      # The "HOME/filesystem / memory-paths" rationale that kept this step
      # soft-failing for 5+ rounds turned out to be a myth: core tests
      # were never actually running in CI because the preceding step
      # (tools shell-abort) was failing, and GitHub Actions skips
      # subsequent steps after a failure. Once 99e73d0 fixed the
      # shell-abort process-group bug, 709abde fixed git-init branch
      # drift, and cdca3b9 fixed the last two test-side issues, core
      # runs 31/31 test files green on Ubuntu. Lifted continue-on-error
      # to make this step a real signal.
      - name: Run core tests
        run: npx turbo run test --filter=@brainst0rm/core

      # Vault (Argon2id — slow by design). Previously marked as
      # "flaky in CI on slow runners" — no evidence of that after core
      # actually ran; 5/5 test files green. Keep the 5-minute timeout
      # because Argon2id genuinely takes a while, but no longer soft.
      - name: Run vault tests
        run: npx turbo run test --filter=@brainst0rm/vault
        timeout-minutes: 5

      # Wiring smoke test: verifies that critical functions are exported,
      # the tool registry contains expected tools, the middleware pipeline
      # creates successfully, and the memory tool wires to a real MemoryManager.
      # This catches the entire class of "defined but never called" bugs.
      - name: Wiring smoke test
        run: node packages/core/src/__tests__/ci-wiring-check.mjs
