name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Brainstorm? We'd love to hear it.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the current limitation?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include examples if possible.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TUI / Display
        - Routing / Model Selection
        - New Tool
        - Build Wizard / Workflows
        - Configuration
        - BrainstormRouter Integration
        - Orchestration Pipeline
        - Plugin SDK / Extensibility
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?
