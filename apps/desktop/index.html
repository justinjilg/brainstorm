<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brainstorm.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brainstorm</title>
    <!--
      Pre-paint styles so the body renders in BR ink-1 (#111215) before
      Vite JS arrives. Without this the OS default (usually white on a
      Mac) flashes in for one frame on cold boot. These values mirror
      --ink-1 / --bone in src/index.css — keep in sync.
    -->
    <style>
      html, body {
        background: #111215;
        color: #e8ecf4;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          "IBM Plex Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
    </style>
  </head>
  <body class="bg-neutral-950 text-neutral-100 overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
