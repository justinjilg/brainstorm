<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 72" width="420" height="72">
  <!-- Routing graph icon -->
  <g transform="translate(24, 36)">
    <!-- Input node (left) -->
    <circle cx="0" cy="0" r="5" fill="#d97706"/>
    <!-- Three output nodes (right) -->
    <circle cx="40" cy="-16" r="4" fill="#d97706"/>
    <circle cx="44" cy="2" r="3.5" fill="#d97706"/>
    <circle cx="40" cy="18" r="3" fill="#d97706"/>
    <!-- Routing lines from input to outputs -->
    <line x1="5" y1="0" x2="36" y2="-16" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="5" y1="0" x2="40" y2="2" stroke="#d97706" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="5" y1="0" x2="36" y2="18" stroke="#d97706" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Subtle return arc (learning feedback) -->
    <path d="M42,-12 Q52,0 42,14" fill="none" stroke="#d97706" stroke-width="1" stroke-linecap="round" opacity="0.25" stroke-dasharray="3,3"/>
  </g>
  <!-- "brainstorm" in system monospace -->
  <text x="80" y="46" font-family="ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, Consolas, monospace" font-size="34" font-weight="700" fill="#1a1a1a" letter-spacing="-0.8">brainstorm</text>
</svg>
