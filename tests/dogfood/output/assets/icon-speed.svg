<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="speed-gradient-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#F97316" />
    </linearGradient>
    <linearGradient id="speed-gradient-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <linearGradient id="speed-gradient-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#92400E" />
      <stop offset="100%" stop-color="#78350F" />
    </linearGradient>
  </defs>
  
  <!-- Gauge background -->
  <circle cx="32" cy="32" r="28" fill="url(#speed-gradient-dark)" />
  
  <!-- Gauge outer ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#speed-gradient-orange)" stroke-width="3" />
  
  <!-- Gauge inner fill -->
  <path d="M32,32 L32,6 A26,26 0 1,1 52,32 Z" fill="url(#speed-gradient-yellow)" opacity="0.8" />
  
  <!-- Gauge ticks -->
  <g stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round">
    <!-- Major ticks -->
    <line x1="32" y1="6" x2="32" y2="10" />
    <line x1="52" y1="32" x2="48" y2="32" />
    <line x1="32" y1="58" x2="32" y2="54" />
    <line x1="12" y1="32" x2="16" y2="32" />
    
    <!-- Minor ticks -->
    <line x1="40" y1="12" x2="41" y2="14" />
    <line x1="46" y1="18" x2="48" y2="19" />
    <line x1="50" y1="26" x2="52" y2="26" />
    <line x1="46" y1="46" x2="48" y2="45" />
    <line x1="40" y1="52" x2="41" y2="50" />
    <line x1="24" y1="52" x2="23" y2="50" />
    <line x1="18" y1="46" x2="16" y2="45" />
    <line x1="14" y1="38" x2="12" y2="38" />
    <line x1="18" y1="18" x2="16" y2="19" />
    <line x1="24" y1="12" x2="23" y2="14" />
  </g>
  
  <!-- Needle -->
  <g transform="rotate(135, 32, 32)">
    <polygon points="32,32 30,6 34,6" fill="#FFFFFF" />
    <circle cx="32" cy="32" r="4" fill="#DC2626" />
    <circle cx="32" cy="32" r="2" fill="#FFFFFF" />
  </g>
  
  <!-- Center hub -->
  <circle cx="32" cy="32" r="8" fill="url(#speed-gradient-dark)" />
  <circle cx="32" cy="32" r="6" fill="#FFFFFF" opacity="0.2" />
  
  <!-- Speed indicator lines -->
  <g stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" opacity="0.7">
    <line x1="32" y1="24" x2="32" y2="28" />
    <line x1="36" y1="28" x2="40" y2="32" />
    <line x1="32" y1="36" x2="32" y2="40" />
  </g>
</svg>