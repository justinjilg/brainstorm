<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="gradient-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="gradient-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <linearGradient id="gradient-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0F172A" />
  
  <!-- Network lines -->
  <g stroke="url(#gradient-blue)" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <line x1="50" y1="50" x2="350" y2="100" />
    <line x1="100" y1="250" x2="300" y2="50" />
    <line x1="150" y1="150" x2="250" y2="200" />
    <line x1="200" y1="100" x2="200" y2="250" />
    <line x1="50" y1="200" x2="350" y2="150" />
    <line x1="300" y1="250" x2="100" y2="100" />
  </g>
  
  <!-- Nodes -->
  <g filter="url(#glow)">
    <circle cx="100" cy="100" r="12" fill="url(#gradient-blue)" />
    <circle cx="200" cy="150" r="15" fill="url(#gradient-purple)" />
    <circle cx="300" cy="100" r="12" fill="url(#gradient-blue)" />
    <circle cx="150" cy="200" r="10" fill="url(#gradient-teal)" />
    <circle cx="250" cy="200" r="10" fill="url(#gradient-teal)" />
    <circle cx="100" cy="250" r="12" fill="url(#gradient-purple)" />
    <circle cx="300" cy="250" r="12" fill="url(#gradient-purple)" />
    <circle cx="200" cy="50" r="15" fill="url(#gradient-blue)" />
  </g>
  
  <!-- Inner node details -->
  <g fill="#FFFFFF" opacity="0.3">
    <circle cx="100" cy="100" r="4" />
    <circle cx="200" cy="150" r="5" />
    <circle cx="300" cy="100" r="4" />
    <circle cx="150" cy="200" r="3" />
    <circle cx="250" cy="200" r="3" />
    <circle cx="100" cy="250" r="4" />
    <circle cx="300" cy="250" r="4" />
    <circle cx="200" cy="50" r="5" />
  </g>
  
  <!-- Floating particles -->
  <g opacity="0.4">
    <circle cx="70" cy="80" r="2" fill="#60A5FA" />
    <circle cx="330" cy="70" r="2" fill="#60A5FA" />
    <circle cx="180" cy="280" r="2" fill="#8B5CF6" />
    <circle cx="280" cy="30" r="2" fill="#8B5CF6" />
    <circle cx="40" cy="180" r="2" fill="#06B6D4" />
    <circle cx="360" cy="220" r="2" fill="#06B6D4" />
  </g>
</svg>